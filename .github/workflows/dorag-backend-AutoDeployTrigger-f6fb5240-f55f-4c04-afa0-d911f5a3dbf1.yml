name: Trigger auto deployment for dorag-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/dorag-backend-AutoDeployTrigger-f6fb5240-f55f-4c04-afa0-d911f5a3dbf1.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DORAGBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DORAGBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DORAGBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: dorag.azurecr.io
          registryUsername: ${{ secrets.DORAGBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DORAGBACKEND_REGISTRY_PASSWORD }}
          containerAppName: dorag-backend
          resourceGroup: dorag-resource
          imageToBuild: dorag.azurecr.io/dorag-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


