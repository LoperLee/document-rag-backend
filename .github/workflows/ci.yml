name: Trigger auto deployment for dorag-container

on:
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ci.yml'


  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DORAGCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DORAGCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DORAGCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          acrName: ${{ secrets.REGISTRY_NAME }}
          acrUsername: ${{ secrets.REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.REGISTRY_PASSWORD }}
          containerAppName: dorag-backend
          resourceGroup: dorag-resource
          imageToBuild: ${{ secrets.REGISTRY_LOGIN_SERVER }}/dorag-backend:latest
          _buildArgumentsKey_: |
            _buildArgumentsValues_